    <!-- ניצחון -->
    <div id="winScreen" class="win-screen hidden">

        <h1>🎉 כל הכבוד! סיימת שלב א׳ 🎉</h1>

        <p>עוברים לשלב ב׳...</p>

    </div>


    <!-- כל ה־HTML של המשחק -->
    <script>
        if (!localStorage.getItem("currentLevel")) {
            localStorage.setItem("currentLevel", "a");
        }
        if (!localStorage.getItem("currentStage")) {
            localStorage.setItem("currentStage", "1");
        }

        function nextStage() {
            localStorage.setItem("currentStage", "2");
            window.location.href = "level2.html";
        }

        function resetGame() {
            localStorage.setItem("currentLevel", "a");
            localStorage.setItem("currentStage", "1");
            location.reload();
        }

        const level = localStorage.getItem("currentLevel");
        const timerLabel = document.getElementById("timerLabel");

        if (level === "b") {
            timerLabel.innerText = "זמן שנותר";
        } else {
            timerLabel.innerText = "זמן שעבר";
        }
        const script = document.createElement("script");
        script.src = `../SCRIPTS/${level}1.js?v=${Date.now()}`;
        script.onload = () => console.log("✅ נטען:", script.src);
        document.body.appendChild(script);
    </script>
