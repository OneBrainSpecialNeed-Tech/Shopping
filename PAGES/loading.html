<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>טוען...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;
    }

    .box {
      text-align: center;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top: 6px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="spinner"></div>
  <h2>טוען את המשחק...</h2>
</div>

<script>
  setTimeout(() => {
    window.location.href = "level1.html";
  }, 2000); // 2 שניות טעינה
</script>

</body>
</html>
