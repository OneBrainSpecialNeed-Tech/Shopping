     <script>
          function nextStage() {
               localStorage.removeItem("currentStage");
               window.location.href = "index.html";
          }

          function resetGame() {
               localStorage.setItem("currentLevel", "a");
               localStorage.setItem("currentStage", "1");
               window.location.href = "level1.html";
          }

          const level = localStorage.getItem("currentLevel");
          const timerLabel = document.getElementById("timerLabel");

          if (level === "b") {
               timerLabel.innerText = "זמן שנותר";
          } else {
               timerLabel.innerText = "זמן שעבר";
          }
          const script = document.createElement("script");
          script.src = `../SCRIPTS/${level}3.js?v=${Date.now()}`;
          script.onload = () => console.log("✅ נטען:", script.src);
          document.body.appendChild(script);
     </script>
